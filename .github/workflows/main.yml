name: Node.js CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16.x'
      - name: Install and Start
        run: |
          npm install --force
          npm start
        env:
          SESSION_ID: ${{ secrets.SESSION_ID }}
          
